<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geometry Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Geometry Calculator</h1>

    <div class="header-weather">
      <div class="header-weather-input">
        <input type="text" id="zip-input" placeholder="ZIP Code" maxlength="5" />
        <button onclick="getWeather()">Get Weather</button>
      </div>
      <div id="weather-result" class="weather-result hidden"></div>
    </div>
  </header>

  <main>
    <div class="grid">

      <!-- Area of Circle -->
      <div class="card">
        <h2>Area of a Circle</h2>
        <div class="field">
          <label for="circle-radius">Radius</label>
          <input type="number" id="circle-radius" placeholder="e.g. 5" min="0" step="any" />
        </div>
        <button onclick="calculate('circle')">Calculate</button>
        <div class="result" id="circle-result">—</div>
      </div>

      <!-- Area of Rectangle -->
      <div class="card">
        <h2>Area of a Rectangle</h2>
        <div class="field">
          <label for="rect-length">Length</label>
          <input type="number" id="rect-length" placeholder="e.g. 8" min="0" step="any" />
        </div>
        <div class="field">
          <label for="rect-width">Width</label>
          <input type="number" id="rect-width" placeholder="e.g. 4" min="0" step="any" />
        </div>
        <button onclick="calculate('rectangle')">Calculate</button>
        <div class="result" id="rectangle-result">—</div>
      </div>

      <!-- Area of Triangle -->
      <div class="card">
        <h2>Area of a Triangle</h2>
        <div class="field">
          <label for="tri-base">Base</label>
          <input type="number" id="tri-base" placeholder="e.g. 6" min="0" step="any" />
        </div>
        <div class="field">
          <label for="tri-height">Height</label>
          <input type="number" id="tri-height" placeholder="e.g. 3" min="0" step="any" />
        </div>
        <button onclick="calculate('triangle')">Calculate</button>
        <div class="result" id="triangle-result">—</div>
      </div>

      <!-- Volume of Cylinder -->
      <div class="card">
        <h2>Volume of a Cylinder</h2>
        <div class="field">
          <label for="cyl-radius">Radius</label>
          <input type="number" id="cyl-radius" placeholder="e.g. 3" min="0" step="any" />
        </div>
        <div class="field">
          <label for="cyl-height">Height</label>
          <input type="number" id="cyl-height" placeholder="e.g. 10" min="0" step="any" />
        </div>
        <button onclick="calculate('cylinder')">Calculate</button>
        <div class="result" id="cylinder-result">—</div>
      </div>

    </div>
  </main>

  <script type="module" src="script.js"></script>

</body>
</html>
